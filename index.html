<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welleni - Connecting to better health. Every hospital. Every patient. One platform.">
  <title>Welleni — Connecting to better health</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.min.css">

  <!-- Config (API keys) — must load first -->
  <script src="config.min.js"></script>

  <!-- Third-party SDKs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Google Maps — key injected from config.min.js -->
  <script>
    (function(){
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + CONFIG.GOOGLE_MAPS_API_KEY + '&libraries=places';
      s.defer = true;
      document.head.appendChild(s);
    })();
  </script>

  <!-- Partial loader — fetches & injects all page sections, then boots script.min.js -->
  <script src="loader.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       All page sections are loaded here dynamically
       by loader.js from the /partials/ folder:

         partials/modals.html             ← Record viewer, Record edit, WhatsApp chat
         partials/landing.html            ← Public landing page
         partials/register.html           ← Patient & Hospital registration
         partials/login.html              ← Login page
         partials/patient-dashboard.html  ← Patient portal
         partials/hospital-dashboard.html ← Hospital portal
         partials/payment-modal.html      ← Payment modal
  ════════════════════════════════════════════════════ -->
  <div id="app-root"></div>

  <!--
    NOTE: script.min.js is NOT loaded here directly.
    loader.js appends it after all partials are injected,
    so the app JS always finds all DOM elements ready.
  -->
</body>
</html>
