<div id="page-register" class="page">
<nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)">
  <div class="nav-inner">
    <a class="nav-logo" onclick="goPage('page-landing')"><svg viewBox="0 0 64 70" style="width:36px;height:40px"><polygon points="32,4 58,18 58,52 32,66 6,52 6,18" fill="#0B7A75"/><rect x="28" y="22" width="8" height="26" rx="3" fill="white"/><rect x="19" y="31" width="26" height="8" rx="3" fill="white"/></svg><span class="logo-text"><span style="font-weight:500;color:#9FE1CB">Well</span><span style="font-weight:400">eni</span></span></a>
    <ul class="nav-links"><li><button onclick="goPage('page-login')" class="nav-btn-outline">Sign In Instead</button></li></ul>
  </div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><svg viewBox="0 0 64 70" style="width:44px;height:50px"><polygon points="32,4 58,18 58,52 32,66 6,52 6,18" fill="#0B7A75"/><rect x="28" y="22" width="8" height="26" rx="3" fill="white"/><rect x="19" y="31" width="26" height="8" rx="3" fill="white"/></svg><span class="logo-text" style="font-size:1.7rem"><span style="font-weight:500;color:#9FE1CB">Well</span><span style="font-weight:400">eni</span></span></div>
    <h2 class="auth-title">Create your account</h2>
    <p class="auth-sub">Join thousands of patients and hospitals across Hyderabad</p>

    <!-- Role selector -->
    <div style="margin-bottom:20px">
      <div style="font-size:.82rem;font-weight:600;color:var(--text-mid);margin-bottom:10px">I am registering as:</div>
      <div class="role-cards">
        <div class="role-card selected" id="role-patient" onclick="selectRole('patient')">
          <div class="role-card-icon">👤</div>
          <div class="role-card-title">Patient</div>
          <div class="role-card-sub">Book appointments & manage records</div>
        </div>
        <div class="role-card" id="rolwelltal" onclick="selectRole('hospital')">
          <div class="role-card-icon">🏥</div>
          <div class="role-card-title">Hospital</div>
          <div class="role-card-sub">Manage patients & operations</div>
        </div>
      </div>
    </div>

    <!-- Patient form -->
    <div id="reg-patient-form">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name *</label><input class="form-control" type="text" id="reg-fname" placeholder="Rajesh"/></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input class="form-control" type="text" id="reg-lname" placeholder="Kumar"/></div>
      </div>
    <div class="form-group">
  <label class="form-label">Mobile Number *</label>
  <div style="display:flex;gap:8px">
    <input class="form-control" type="tel" id="reg-mobile" placeholder="+91 98765 43210" style="flex:1"/>
    <button type="button" onclick="sendOTP('patient')" id="patient-otp-btn"
      style="background:#085553;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap">
      Send OTP
    </button>
  </div>
</div>
<div class="form-group" id="patient-otp-group" style="display:none">
  <label class="form-label">Enter OTP *</label>
  <div style="display:flex;gap:8px">
    <input class="form-control" type="text" id="reg-patient-otp" placeholder="6-digit OTP" maxlength="6"
      style="flex:1;letter-spacing:4px;font-size:1.1rem;font-weight:600"/>
    <button type="button" onclick="verifyOTP('patient')" id="patient-verify-btn"
      style="background:#0B7A75;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:.82rem;font-weight:600;cursor:pointer">
      Verify
    </button>
  </div>
  <div id="patient-otp-status" style="font-size:.78rem;margin-top:6px;color:#6B7280"></div>
</div>
      <div class="form-group"><label class="form-label">Email Address *</label><input class="form-control" type="email" id="reg-email" placeholder="rajesh@email.com"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date of Birth</label><input class="form-control" type="date" id="reg-dob"/></div>
        <div class="form-group"><label class="form-label">Blood Group</label>
          <select class="form-control" id="reg-blood"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Password *</label><input class="form-control" type="password" id="reg-password" placeholder="Min 8 chars, 1 uppercase, 1 number"/></div>
      <div class="form-group"><label class="form-label">Confirm Password *</label><input class="form-control" type="password" id="reg-confirm" placeholder="Repeat password"/></div>
    </div>

    <!-- Hospital form -->
    <div id="reg-hospital-form" style="display:none">
      <div class="form-group"><label class="form-label">Hospital Name *</label><input class="form-control" type="text" id="reg-hosp-name" placeholder="Apollo Hospitals"/></div>
      <div class="form-group"><label class="form-label">Registration Number</label><input class="form-control" type="text" id="reg-hosp-regno" placeholder="MCI-HYD-2024-XXXXX"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">City</label><input class="form-control" type="text" id="reg-hosp-city" placeholder="Hyderabad"/></div>
        <div class="form-group"><label class="form-label">Pincode</label><input class="form-control" type="text" id="reg-hosp-pin" placeholder="500032"/></div>
      </div>
      <div class="form-group"><label class="form-label">Contact Person</label><input class="form-control" type="text" id="reg-hosp-contact" placeholder="Dr. Name / Admin Name"/></div>
      <div class="form-group"><label class="form-label">Official Email *</label><input class="form-control" type="email" id="reg-hosp-email" placeholder="admin@hospital.com"/></div>
      <div class="form-group">
  <label class="form-label">Phone Number *</label>
  <div style="display:flex;gap:8px">
    <input class="form-control" type="tel" id="reg-hosp-phone" placeholder="+91 98765 43210" style="flex:1"/>
    <button type="button" onclick="sendOTP('hospital')" id="hosp-otp-btn"
      style="background:#085553;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap">
      Send OTP
    </button>
  </div>
</div>
<div class="form-group" id="hosp-otp-group" style="display:none">
  <label class="form-label">Enter OTP *</label>
  <div style="display:flex;gap:8px">
    <input class="form-control" type="text" id="reg-hosp-otp" placeholder="6-digit OTP" maxlength="6" style="flex:1;letter-spacing:4px;font-size:1.1rem;font-weight:600"/>
    <button type="button" onclick="verifyOTP('hospital')" id="hosp-verify-btn"
      style="background:#0B7A75;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:.82rem;font-weight:600;cursor:pointer">
      Verify
    </button>
  </div>
  <div id="hosp-otp-status" style="font-size:.78rem;margin-top:6px;color:#6B7280"></div>
</div>
      <div class="form-group"><label class="form-label">Confirm Password *</label><input class="form-control" type="password" id="reg-hosp-confirm" placeholder="Repeat password"/></div>
    </div>

    <button class="form-btn" id="reg-btn" onclick="handleRegister()">Create Account →</button>
    <div class="auth-switch">Already have an account? <a onclick="goPage('page-login')">Sign in here</a></div>
  </div>
</div>
</div><!-- /page-register -->
