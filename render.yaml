services:
  - type: web
    name: welleni
    env: static
    buildCommand: echo "No build needed"
    staticPublishPath: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: APP_NAME
        value: Welleni
      - key: APP_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
